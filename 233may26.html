<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра в Города</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 400px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
        }

        .status {
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #000000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .history-box {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
        }

        ol {
            margin: 0;
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Игра «Города»</h1>
        <div id="status" class="status">Ходит Игрок 1. Введите город.</div>
        
        <form id="game-form">
            <input type="text" id="city-input" placeholder="Название города..." autocomplete="off">
            <button type="submit">Ход</button>
        </form>

        <h3>История ходов:</h3>
        <div class="history-box">
            <ol id="history-list"></ol>
        </div>
    </div>

    <script>
        const gameForm = document.getElementById('game-form');
        const cityInput = document.getElementById('city-input');
        const statusDiv = document.getElementById('status');
        const historyList = document.getElementById('history-list');

        let currentPlayer = 1;
        let nextLetter = '';
        const usedCities = new Set();
        const badLetters = ['ь', 'ъ', 'ы', 'й'];

        gameForm.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const rawInput = cityInput.value;
            const city = rawInput.trim();

            if (city === '') {
                statusDiv.textContent = 'Ошибка: Поле не может быть пустым!';
                statusDiv.style.color = 'red';
                return;
            }

            const cityLow = city.toLowerCase();

            if (usedCities.has(cityLow)) {
                statusDiv.textContent = `Ошибка: Город "${city}" уже был!`;
                statusDiv.style.color = 'red';
                return;
            }

            if (nextLetter !== '' && cityLow[0] !== nextLetter) {
                statusDiv.textContent = `Ошибка: Город должен начинаться на букву "${nextLetter.toUpperCase()}"!`;
                statusDiv.style.color = 'red';
                return;
            }

            let lastChar = '';
            for (let i = cityLow.length - 1; i >= 0; i--) {
                if (!badLetters.includes(cityLow[i])) {
                    lastChar = cityLow[i];
                    break;
                }
            }

            usedCities.add(cityLow);
            nextLetter = lastChar;

            const li = document.createElement('li');
            li.textContent = `${city} (Игрок ${currentPlayer})`;
            historyList.appendChild(li);

            currentPlayer = currentPlayer === 1 ? 2 : 1;

            statusDiv.textContent = `Успешно! Ходит Игрок ${currentPlayer}. Нужна буква: ${nextLetter.toUpperCase()}`;
            statusDiv.style.color = 'green';

            cityInput.value = '';
        });
    </script>

</body>
</html>
